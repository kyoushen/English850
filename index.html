<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>850词 · 英语启蒙</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap');
  :root{--bg:#0f0f0d;--surface:#1a1a16;--card:#222219;--border:#2e2e28;--accent:#e8c84a;--accent2:#5fe0a0;--accent3:#f07060;--text:#e8e6d8;--muted:#888880;--dim:#555550;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;overflow-x:hidden;}
  header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
  .logo{font-family:'Fraunces',serif;font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--accent);}
  .logo span{color:var(--text);font-weight:300;font-style:italic;}
  .header-stats{display:flex;gap:24px;align-items:center;}
  .stat-pill{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);border:1px solid var(--border);padding:4px 12px;border-radius:100px;}
  .stat-pill b{color:var(--accent2);}
  .tabs{display:flex;padding:0 32px;border-bottom:1px solid var(--border);background:var(--surface);}
  .tab-btn{padding:14px 20px;font-family:'Noto Sans SC',sans-serif;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
  .main{display:flex;height:calc(100vh - 100px);}
  .sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:16px 0;}
  .sidebar-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--dim);padding:8px 20px 4px;text-transform:uppercase;}
  .category-btn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 20px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;font-family:'Noto Sans SC',sans-serif;}
  .category-btn:hover{background:var(--card);color:var(--text);}
  .category-btn.active{background:var(--card);color:var(--accent);}
  .category-btn .count{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);}
  .category-btn.active .count{color:var(--accent);opacity:.6;}
  .content{flex:1;overflow-y:auto;padding:24px 28px;}
  .section-header{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;}
  .section-title{font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:var(--text);letter-spacing:-1px;}
  .section-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);}
  .search-bar{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:10px 16px;border-radius:8px;margin-bottom:20px;outline:none;transition:border-color .2s;}
  .search-bar::placeholder{color:var(--dim);}
  .search-bar:focus{border-color:var(--accent);}
  .word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
  .word-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .15s;position:relative;}
  .word-card:hover{border-color:var(--accent);transform:translateY(-1px);background:#26261e;}
  .word-card.learned{border-color:var(--accent2);opacity:.7;}
  .word-card.learned::after{content:'✓';position:absolute;top:6px;right:8px;font-size:11px;color:var(--accent2);}
  .word-en{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--text);}
  .word-zh{font-size:11px;color:var(--muted);margin-top:3px;}
  /* PRACTICE */
  .practice-area{flex:1;overflow-y:auto;padding:40px;display:flex;flex-direction:column;align-items:center;gap:24px;}
  .progress-wrap{width:100%;max-width:680px;display:flex;align-items:center;gap:16px;}
  .progress-bar-bg{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s ease;}
  .progress-text{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);white-space:nowrap;}
  .loading-bar{width:100%;max-width:680px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;display:none;}
  .loading-bar.active{display:block;}
  .loading-bar::after{content:'';display:block;height:100%;width:40%;background:var(--accent);border-radius:2px;animation:slide 1.2s ease-in-out infinite;}
  @keyframes slide{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
  .loading-msg{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);text-align:center;display:none;}
  .loading-msg.active{display:block;}
  /* word card */
  .p-word-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 40px;width:100%;max-width:680px;text-align:center;}
  .p-word-en{font-family:'Fraunces',serif;font-size:52px;font-weight:900;letter-spacing:-2px;color:var(--accent);line-height:1;margin-bottom:8px;}
  .p-word-zh{font-size:18px;color:var(--muted);}
  /* sentence */
  .sentence-box{width:100%;max-width:680px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;}
  .sentence-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .sentence-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
  /* toolbar */
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
  .toolbar-left,.toolbar-right{display:flex;align-items:center;gap:6px;}
  .tool-btn{
    display:inline-flex;align-items:center;gap:5px;
    background:var(--card);border:1px solid var(--border);
    color:var(--muted);border-radius:7px;
    padding:6px 10px;font-size:12px;cursor:pointer;
    transition:all .15s;white-space:nowrap;font-family:'Noto Sans SC',sans-serif;
  }
  .tool-btn:hover{border-color:var(--accent2);color:var(--text);}
  .tool-btn.speed-active{border-color:var(--accent2);color:var(--accent2);background:rgba(95,224,160,.08);}
  .tool-btn.speaking{border-color:var(--accent2);color:var(--accent2);animation:pulse .8s ease infinite;}
  .tool-btn kbd{
    font-family:'DM Mono',monospace;font-size:10px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:3px;padding:1px 4px;color:var(--dim);
    margin-left:2px;
  }
  .tool-sep{width:1px;height:20px;background:var(--border);margin:0 2px;}
  /* sentence-actions kept for panel */
  .sentence-actions{display:flex;gap:8px;align-items:center;}
  .icon-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:13px;cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace;}
  .icon-btn:hover{border-color:var(--accent2);color:var(--accent2);}
  .icon-btn.speaking{border-color:var(--accent2);color:var(--accent2);animation:pulse .8s ease infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .speed-btn{background:var(--card);border:1px solid var(--border);color:var(--dim);font-family:'DM Mono',monospace;font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;transition:all .15s;}
  .speed-btn.active{border-color:var(--accent2);color:var(--accent2);}
  /* mode toggle */
  .mode-toggle{display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;width:100%;max-width:680px;}
  .mode-btn{flex:1;padding:10px 0;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;transition:all .15s;letter-spacing:.3px;}
  .mode-btn.active{background:var(--accent);color:#0f0f0d;font-weight:700;}
  .mode-btn:not(.active):hover{color:var(--text);background:var(--surface);}
  /* full sentence input mode */
  .full-input{width:100%;max-width:680px;background:var(--surface);border:2px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:15px;padding:14px 16px;border-radius:10px;outline:none;transition:border-color .2s;letter-spacing:.3px;resize:none;height:60px;}
  .full-input:focus{border-color:var(--accent);}
  .full-input.correct-flash{border-color:var(--accent2);}
  .full-input.shake{animation:shake .4s ease;}
  /* slot grid - 横线格子输入 */
  .slots-row{display:flex;flex-wrap:wrap;gap:10px 14px;margin-bottom:16px;align-items:flex-end;}
  .slot-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .slot-input{
    font-family:'DM Mono',monospace;font-size:15px;font-weight:500;
    color:var(--text);background:transparent;
    border:none;border-bottom:2px solid var(--border);
    outline:none;text-align:center;padding:4px 2px;
    min-width:28px;max-width:160px;
    transition:border-color .15s,color .15s;
    letter-spacing:.5px;
  }
  .slot-input:focus{border-bottom-color:var(--accent);color:var(--accent);}
  .slot-input.correct{border-bottom-color:var(--accent2);color:var(--accent2);}
  .slot-input.wrong{border-bottom-color:var(--accent3);color:var(--accent3);}
  .slot-input.hint-shown{border-bottom-color:var(--accent);color:var(--accent);opacity:.7;}
  .slot-input:disabled{cursor:default;}
  .slot-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:.5px;height:14px;}
  .slot-label.correct{color:var(--accent2);}
  .slot-label.wrong{color:var(--accent3);}
  /* keep old token styles for compatibility */
  .token{font-family:'DM Mono',monospace;font-size:14px;padding:4px 10px;border-radius:6px;border:1px solid transparent;}
  .token.correct{background:rgba(95,224,160,.15);border-color:var(--accent2);color:var(--accent2);}
  .token.wrong{background:rgba(240,112,96,.15);border-color:var(--accent3);color:var(--accent3);}
  .token.hint-shown{background:rgba(232,200,74,.1);border-color:var(--accent);color:var(--accent);}
  .token.pending{color:var(--dim);border-color:var(--border);}
  /* input area */
  .input-area{display:flex;gap:8px;}
  .word-input{flex:1;background:var(--surface);border:2px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:16px;padding:12px 16px;border-radius:10px;outline:none;transition:border-color .2s;letter-spacing:.5px;}
  .word-input:focus{border-color:var(--accent);}
  .word-input.shake{animation:shake .4s ease;}
  .word-input.correct-flash{border-color:var(--accent2);}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  .submit-btn{background:var(--accent);color:#0f0f0d;border:none;border-radius:10px;padding:12px 20px;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .submit-btn:hover{background:#f0d060;}
  .submit-btn:disabled{opacity:.4;cursor:not-allowed;}
  /* hint reveal */
  .hint-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .hint-word{font-family:'DM Mono',monospace;font-size:13px;color:var(--dim);background:var(--surface);border:1px dashed var(--border);padding:4px 10px;border-radius:6px;}
  /* sentence zh */
  .sentence-zh{font-size:14px;color:var(--muted);margin-top:12px;line-height:1.6;}
  /* full reveal */
  .full-reveal{display:none;margin-top:12px;padding:12px 16px;background:rgba(232,200,74,.08);border:1px solid rgba(232,200,74,.25);border-radius:8px;font-family:'Fraunces',serif;font-size:18px;font-weight:300;color:var(--text);line-height:1.6;letter-spacing:-.2px;}
  .full-reveal em{color:var(--accent);font-weight:600;font-style:italic;}
  /* word counter */
  .word-counter{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);margin-top:8px;text-align:right;}
  /* feedback */
  .feedback-row{width:100%;max-width:680px;display:none;}
  .feedback-msg{font-family:'DM Mono',monospace;font-size:13px;padding:10px 16px;border-radius:8px;display:flex;align-items:center;gap:8px;}
  .feedback-msg.correct{background:rgba(95,224,160,.12);color:var(--accent2);}
  .feedback-msg.wrong{background:rgba(240,112,96,.12);color:var(--accent3);}
  /* btn */
  .btn{font-family:'Noto Sans SC',sans-serif;font-size:13px;font-weight:500;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--accent);color:#0f0f0d;}
  .btn-primary:hover{background:#f0d060;}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--muted);color:var(--text);}
  .btn-row{display:flex;gap:10px;justify-content:center;}
  /* empty */
  .empty-state{text-align:center;padding:60px 20px;color:var(--dim);}
  .empty-state .big{font-size:48px;margin-bottom:12px;}
  .empty-state p{font-size:14px;line-height:1.8;}
  /* api warn */

  /* panel */
  .panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;}
  .panel-overlay.open{display:flex;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:560px;position:relative;animation:pop .2s ease;}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .panel-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;}
  .panel-word{font-family:'Fraunces',serif;font-size:48px;font-weight:900;letter-spacing:-2px;color:var(--accent);}
  .panel-def{font-size:18px;color:var(--text);margin-bottom:24px;margin-top:8px;}
  .panel-section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;}
  .panel-sentence{font-family:'Fraunces',serif;font-size:18px;font-weight:300;line-height:1.6;color:var(--text);margin-bottom:8px;}
  .panel-sentence em{color:var(--accent);font-weight:600;font-style:italic;}
  .panel-sentence-zh{font-size:14px;color:var(--muted);line-height:1.6;}
  .panel-loading{color:var(--dim);font-family:'DM Mono',monospace;font-size:13px;padding:20px 0;}
  .panel-actions{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;align-items:center;}
  .tab-content{display:none;}
  .tab-content.active{display:flex;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<header>
  <div class="logo">850<span>词</span></div>
  <div class="header-stats">
    <div class="stat-pill">已学 <b id="learned-count">0</b> / 850</div>
    <div class="stat-pill">今日练习 <b id="practice-count">0</b> 次</div>
  </div>
</header>

<div style="background:var(--surface);border-bottom:1px solid var(--border);">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('vocab')">📖 词汇</button>
    <button class="tab-btn" onclick="switchTab('practice')">🎯 练习</button>
  </div>
</div>

<!-- VOCAB TAB -->
<div class="tab-content active main" id="tab-vocab">
  <div class="sidebar">
    <div class="sidebar-label">分类</div>
    <button class="category-btn active" onclick="selectCategory('all')" id="cat-all">全部词汇 <span class="count">850</span></button>
    <button class="category-btn" onclick="selectCategory('operations')" id="cat-operations">操作词 <span class="count">100</span></button>
    <button class="category-btn" onclick="selectCategory('general')" id="cat-general">通用词 <span class="count">400</span></button>
    <button class="category-btn" onclick="selectCategory('picturable')" id="cat-picturable">图画词 <span class="count">200</span></button>
    <button class="category-btn" onclick="selectCategory('qualities')" id="cat-qualities">形容词 <span class="count">150</span></button>
    <div class="sidebar-label" style="margin-top:16px;">筛选</div>
    <button class="category-btn" onclick="selectCategory('unlearned')" id="cat-unlearned">未学习 <span class="count" id="unlearned-count">850</span></button>
    <button class="category-btn" onclick="selectCategory('learned')" id="cat-learned">已学习 <span class="count" id="learned-sidebar">0</span></button>
  </div>
  <div class="content">
    <div class="section-header">
      <div class="section-title" id="section-title">全部词汇</div>
      <div class="section-sub" id="section-sub">850 个词</div>
    </div>
    <input class="search-bar" placeholder="搜索单词…" id="search-input" oninput="filterWords()" />
    <div class="word-grid" id="word-grid"></div>
  </div>
</div>

<!-- PRACTICE TAB -->
<div class="tab-content" id="tab-practice" style="flex-direction:column;align-items:stretch;height:calc(100vh - 100px);overflow:hidden;">
  <div class="practice-area" id="practice-area">



    <!-- progress -->
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">0 / 10</div>
    </div>

    <div class="loading-bar" id="loading-bar"></div>
    <div class="loading-msg" id="loading-msg">AI 正在生成例句…</div>

    <!-- current word display -->
    <div class="p-word-card" id="p-word-card" style="display:none">
      <div class="p-word-en" id="p-word"></div>
      <div class="p-word-zh" id="p-zh"></div>
    </div>

    <!-- mode toggle -->
    <div class="mode-toggle" id="mode-toggle" style="display:none">
      <button class="mode-btn active" id="mode-btn-word" onclick="setMode('word')">⌨️ 逐词模式　<span style="font-size:10px;opacity:.7">每词 Enter 核查</span></button>
      <button class="mode-btn" id="mode-btn-full" onclick="setMode('full')">📝 整句模式　<span style="font-size:10px;opacity:.7">全部输完再核查</span></button>
    </div>

    <!-- sentence typing area -->
    <div class="sentence-box" id="sentence-box" style="display:none">

      <!-- toolbar：可点击按钮 + 快捷键提示 -->
      <div class="toolbar" id="main-toolbar">
        <div class="toolbar-left">
          <button class="tool-btn" id="speak-btn" onclick="speakCurrent()" title="朗读句子 (Shift+1)">
            🔊 <span>朗读</span><kbd>⇧1</kbd>
          </button>
          <div class="tool-sep"></div>
          <button class="tool-btn speed-active" id="spd-slow" onclick="setSpeed(0.8,this,'spd-slow')" title="慢速 (Shift+2)">
            🐢 <span>慢</span><kbd>⇧2</kbd>
          </button>
          <button class="tool-btn" id="spd-normal" onclick="setSpeed(1.0,this,'spd-normal')" title="正常速度 (Shift+3)">
            ▶ <span>正常</span><kbd>⇧3</kbd>
          </button>
          <button class="tool-btn" id="spd-fast" onclick="setSpeed(1.2,this,'spd-fast')" title="快速 (Shift+4)">
            🐇 <span>快</span><kbd>⇧4</kbd>
          </button>
        </div>
        <div class="toolbar-right">
          <button class="tool-btn" id="hint-btn" onclick="toggleHint()" title="提示 (Shift+5)">
            💡 <span>提示</span><kbd>⇧5</kbd>
          </button>
          <button class="tool-btn" onclick="revealAll()" title="显示答案 (Shift+6)">
            👁 <span>答案</span><kbd>⇧6</kbd>
          </button>
        </div>
      </div>

      <div class="sentence-header" style="margin-top:14px;">
        <div class="sentence-label" id="sentence-label-text">逐词输入句子</div>
      </div>

      <!-- slot grid (shared by both modes) -->
      <div class="slots-row" id="slots-row"></div>

      <!-- word counter -->
      <div class="word-counter" id="word-counter"></div>

      <!-- FULL MODE check button (only shown in full mode) -->
      <div id="full-check-bar" style="display:none;margin-top:14px;">
        <button class="btn btn-primary" style="width:100%;" onclick="submitFullSentence()">核查答案</button>
      </div>

      <!-- hint strip (hidden by default) -->
      <div class="hint-strip" id="hint-strip" style="display:none"></div>
      <!-- full reveal -->
      <div class="full-reveal" id="full-reveal"></div>
      <!-- zh translation -->
      <div class="sentence-zh" id="sentence-zh"></div>
    </div>

    <!-- feedback -->
    <div class="feedback-row" id="feedback-row">
      <div class="feedback-msg" id="feedback-msg"></div>
    </div>

    <!-- next btn -->
    <div class="btn-row" id="btn-row" style="display:none">
      <button class="btn btn-ghost" onclick="retryCurrent()">🔁 重试</button>
      <button class="btn btn-primary" onclick="nextWord()">下一个 →</button>
    </div>

    <!-- done -->
    <div class="empty-state" id="practice-empty" style="display:none">
      <div class="big">🎉</div>
      <p>这轮练习完成！</p>
      <br><button class="btn btn-primary" onclick="startPractice()">再来一轮</button>
    </div>

    <!-- start -->
    <div class="empty-state" id="practice-start">
      <div class="big">⌨️</div>

let audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playSuccess(){
  try{
    const ctx=getAudioCtx();
    const freqs=[523,659,784,1047];
    freqs.forEach((f,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=f;osc.type='sine';
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.1);
      gain.gain.linearRampToValueAtTime(0.18,ctx.currentTime+i*0.1+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.25);
      osc.start(ctx.currentTime+i*0.1);
      osc.stop(ctx.currentTime+i*0.1+0.25);
    });
  }catch(e){}
}

function playError(){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=220;osc.type='sawtooth';
    gain.gain.setValueAtTime(0.15,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);
  }catch(e){}
}

function playTick(){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=800;osc.type='sine';
    gain.gain.setValueAtTime(0.08,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.08);
  }catch(e){}
}

// confetti
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  canvas.style.display='block';
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const particles=Array.from({length:80},()=>({
    x:Math.random()*canvas.width,y:Math.random()*-100,
    vx:(Math.random()-0.5)*4,vy:Math.random()*4+2,
    color:['#e8c84a','#5fe0a0','#f07060','#60b0f0','#d060f0'][Math.floor(Math.random()*5)],
    size:Math.random()*8+4,rot:Math.random()*360,vrot:(Math.random()-0.5)*8
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      ctx.restore();
    });
    frame++;
    if(frame<80)requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';}
  }
  draw();
}

// ── 语音：Google TTS（清晰标准），失败时降级到浏览器内置 ──
let currentAudio=null;

function speak(text,btnId){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const btn=btnId?document.getElementById(btnId):null;
  if(btn)btn.classList.add('speaking');
  // Google TTS 公开接口，美式英语，发音标准清晰
  const lang='en-US';
  const url=`https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=gtx&ttsspeed=${speechSpeed}`;
  const audio=new Audio(url);
  currentAudio=audio;
  audio.playbackRate=speechSpeed;
  audio.onended=()=>{if(btn)btn.classList.remove('speaking');currentAudio=null;};
  audio.onerror=()=>{
    // Google TTS 失败时降级到浏览器内置语音
    currentAudio=null;
    if(btn)btn.classList.remove('speaking');
    speakFallback(text,btnId);
  };
  audio.play().catch(()=>{
    currentAudio=null;
    if(btn)btn.classList.remove('speaking');
    speakFallback(text,btnId);
  });
}

function speakFallback(text,btnId){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='en-US';utt.rate=speechSpeed;utt.pitch=1;
  const voices=window.speechSynthesis.getVoices();
  // 优先级：Samantha(Mac) > Daniel > 任意en-US > 任意en
  const v=voices.find(v=>v.name==='Samantha')
    ||voices.find(v=>v.name==='Daniel')
    ||voices.find(v=>v.lang==='en-US')
    ||voices.find(v=>v.lang.startsWith('en'));
  if(v)utt.voice=v;
  const btn=btnId?document.getElementById(btnId):null;
  if(btn){btn.classList.add('speaking');utt.onend=()=>btn.classList.remove('speaking');utt.onerror=()=>btn.classList.remove('speaking');}
  window.speechSynthesis.speak(utt);
}

function startPractice(withQueue){
  document.getElementById('practice-start').style.display='none';
  document.getElementById('practice-empty').style.display='none';
  if(!withQueue){
    const unlearned=ALL_WORDS.filter(w=>!learnedWords.includes(w.w));
    const pool=unlearned.length>0?unlearned:ALL_WORDS;
    practiceQueue=shuffle(pool).slice(0,10);practiceIndex=0;
  }
  document.getElementById('progress-wrap').style.display='flex';
  updateProgress();loadPracticeWord();
}

function updateProgress(){
  const total=practiceQueue.length,done=practiceIndex;
  document.getElementById('progress-fill').style.width=(done/total*100)+'%';
  document.getElementById('progress-text').textContent=done+' / '+total;
}

async function loadPracticeWord(){
  if(practiceIndex>=practiceQueue.length){
    ['p-word-card','sentence-box','feedback-row','btn-row','mode-toggle'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById('practice-empty').style.display='block';return;
  }
  currentWord=practiceQueue[practiceIndex];
  window.speechSynthesis?.cancel();
  document.getElementById('p-word').textContent=currentWord.w;
  document.getElementById('p-zh').textContent=currentWord.z;
  document.getElementById('p-word-card').style.display='block';
  document.getElementById('sentence-box').style.display='none';
  document.getElementById('feedback-row').style.display='none';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('loading-bar').classList.add('active');
  document.getElementById('loading-msg').classList.add('active');
  updateProgress();
  await fetchSentence(currentWord);
}

function fetchSentence(wordObj){
  const w=wordObj.w.toLowerCase();
  const entry=SENTENCE_DB[w]||SENTENCE_DB[wordObj.w];
  document.getElementById('loading-bar').classList.remove('active');
  document.getElementById('loading-msg').classList.remove('active');
  if(entry){
    setupTyping(entry[0],entry[1],wordObj.w);
  }else{
    setupTyping(`I use the word ${wordObj.w} every day.`,`"${wordObj.z}"是一个很常用的词。`,wordObj.w);
  }
}

function setupTyping(sentence,zh,targetWord){
  currentSentence=sentence;currentSentenceZh=zh;
  tokens=sentence.trim().split(/\s+/).filter(Boolean);
  tokenIndex=0;hintCount=0;
  tokenStates=tokens.map(()=>'pending');
  tokenTyped=tokens.map(()=>'');
  document.getElementById('mode-toggle').style.display='flex';
  document.getElementById('sentence-box').style.display='block';
  document.getElementById('full-reveal').style.display='none';
  document.getElementById('hint-strip').style.display='none';
  document.getElementById('sentence-zh').textContent='';
  document.getElementById('feedback-row').style.display='none';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('full-check-bar').style.display=practiceMode==='full'?'block':'none';
  document.getElementById('sentence-label-text').textContent=practiceMode==='word'?'逐词输入句子':'输入完整句子';
  document.getElementById('hint-btn').style.display=practiceMode==='word'?'':'none';
  renderSlots();
  updateWordCounter();
  setTimeout(()=>speak(targetWord,null),400);
}

// 渲染格子输入行
function renderSlots(){
  const row=document.getElementById('slots-row');
  row.innerHTML=tokens.map((t,i)=>{
    // 宽度按词长自适应，最少3字符宽
    const chars=Math.max(t.replace(/[^a-zA-Z'-]/g,'').length,3);
    const w=Math.min(chars*11+16,160);
    const state=tokenStates[i];
    const val=tokenTyped[i]||'';
    const isCurrent=(practiceMode==='word')&&(i===tokenIndex);
    // label行：答对显示正确词，答错显示正确词作为提示，当前词显示序号
    let label='';
    if(state==='correct') label=`<div class="slot-label correct">✓</div>`;
    else if(state==='wrong') label=`<div class="slot-label wrong" title="正确: ${t}">${t}</div>`;
    else if(state==='hint-shown') label=`<div class="slot-label" style="color:var(--accent)">${t}</div>`;
    else label=`<div class="slot-label">${i+1}</div>`;
    const cls=['slot-input', state!=='pending'?state:'', isCurrent?'current':''].filter(Boolean).join(' ');
    const disabled=(state!=='pending'&&practiceMode==='word')||(tokenStates.every(s=>s!=='pending'))?'disabled':'';
    // 整句模式禁用已批改的格子
    const disabledFull=practiceMode==='full'&&state!=='pending'?'disabled':'';
    return `<div class="slot-wrap">
      ${label}
      <input class="${cls}" data-idx="${i}"
        value="${val}"
        style="width:${w}px"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        ${practiceMode==='word'&&state!=='pending'?'disabled':''}
        ${practiceMode==='full'&&state!=='pending'?'disabled':''}
        onkeydown="onSlotKey(event,${i})"
        oninput="onSlotInput(event,${i})"
      />
    </div>`;
  }).join('');
  // 聚焦当前格子
  focusSlot(tokenIndex);
}

function focusSlot(idx){
  if(idx>=tokens.length)return;
  setTimeout(()=>{
    const inputs=document.querySelectorAll('#slots-row .slot-input');
    if(inputs[idx]&&!inputs[idx].disabled)inputs[idx].focus();
  },30);
}

function getSlotInput(idx){
  return document.querySelectorAll('#slots-row .slot-input')[idx];
}

function onSlotInput(e,idx){
  playTyping();
  tokenTyped[idx]=e.target.value;
  // 整句模式：自动跳到下一个空格（输入空格时）
  if(practiceMode==='full'){
    if(e.target.value.endsWith(' ')){
      e.target.value=e.target.value.trimEnd();
      tokenTyped[idx]=e.target.value;
      focusSlot(idx+1);
    }
    return;
  }
  // 逐词模式：输入空格时自动提交
  if(e.target.value.endsWith(' ')){
    e.target.value=e.target.value.trimEnd();
    tokenTyped[idx]=e.target.value;
    submitSlot(idx);
  }
}

function onSlotKey(e,idx){
  if(e.key==='Enter'){
    e.preventDefault();
    if(practiceMode==='word') submitSlot(idx);
    else{
      // 整句模式Enter：跳到下一格，最后一格则核查
      if(idx<tokens.length-1) focusSlot(idx+1);
      else submitFullSentence();
    }
  }
  if(e.key==='Tab'){
    e.preventDefault();
    focusSlot(e.shiftKey?idx-1:idx+1);
  }
  if(e.key==='Backspace'&&e.target.value===''&&idx>0&&practiceMode==='full'){
    focusSlot(idx-1);
  }
}

function normalizeWord(w){return w.replace(/[^a-zA-Z'-]/g,'').toLowerCase();}

function submitSlot(idx){
  if(idx!==tokenIndex||tokenStates[idx]!=='pending')return;
  const inp=getSlotInput(idx);
  const typed=(inp?inp.value:tokenTyped[idx]).trim();
  if(!typed)return;
  const expected=tokens[idx];
  const correct=normalizeWord(typed)===normalizeWord(expected);
  tokenTyped[idx]=typed;
  if(correct){
    tokenStates[idx]='correct';
    playTick();
    // flash green
    if(inp){inp.classList.add('correct');inp.disabled=true;}
  }else{
    tokenStates[idx]='wrong';
    playError();
    if(inp){
      inp.classList.add('wrong');inp.disabled=true;
      inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);
    }
    showWordError(typed,expected);
  }
  tokenIndex++;
  // update label above the slot
  renderSlots();
  updateWordCounter();
  if(tokenIndex>=tokens.length){
    setTimeout(finishSentence,300);
  }
}

// 逐词模式兼容旧的submitWord调用
function submitWord(){submitSlot(tokenIndex);}

function updateWordCounter(){
  const done=tokenStates.filter(s=>s!=='pending').length;
  document.getElementById('word-counter').textContent=`${done} / ${tokens.length} 词`;
}

function showWordError(typed,expected){
  const fb=document.getElementById('feedback-row');
  const msg=document.getElementById('feedback-msg');
  fb.style.display='block';
  msg.className='feedback-msg wrong';
  const t=typed.toLowerCase(),e=expected.toLowerCase();
  let diff='';
  for(let i=0;i<Math.max(t.length,e.length);i++){
    if(t[i]!==e[i]){diff=` （第${i+1}个字母错了，应该是 "${e[i]||'?'}"，你打了 "${t[i]||'?'}"）`;break;}
  }
  msg.textContent=`✗  "${typed}" → 正确是 "${expected}"${diff}`;
}

function finishSentence(){
  const allCorrect=tokenStates.every(s=>s==='correct');
  // disable all slots
  document.querySelectorAll('#slots-row .slot-input').forEach(el=>el.disabled=true);
  const fb=document.getElementById('feedback-row');
  const msg=document.getElementById('feedback-msg');
  fb.style.display='block';
  if(allCorrect){
    msg.className='feedback-msg correct';
    msg.textContent='🎉 完美！整句全对！';
    playSuccess();launchConfetti();
    if(!learnedWords.includes(currentWord.w)){
      learnedWords.push(currentWord.w);
      localStorage.setItem('learned850',JSON.stringify(learnedWords));
    }
  }else{
    const wrongCount=tokenStates.filter(s=>s==='wrong').length;
    msg.className='feedback-msg wrong';
    msg.textContent=`完成！${wrongCount} 个词有误，格子上方显示正确答案`;
    // show full correct sentence
    const reveal=document.getElementById('full-reveal');
    reveal.innerHTML=tokens.map((t,i)=>
      tokenStates[i]==='correct'
        ?`<span style="color:var(--accent2)">${t}</span>`
        :`<em>${t}</em>`
    ).join(' ');
    reveal.style.display='block';
  }
  document.getElementById('sentence-zh').textContent=currentSentenceZh;
  setTimeout(()=>speak(currentSentence,'speak-btn'),600);
  practiceCount++;localStorage.setItem('practiceCount850',practiceCount);
  updateStats();filterWords();
  document.getElementById('btn-row').style.display='flex';
}

function toggleHint(){
  if(practiceMode==='full')return;
  if(tokenIndex>=tokens.length)return;
  const currentToken=tokens[tokenIndex];
  const strip=document.getElementById('hint-strip');
  hintCount++;
  let hint='';
  if(hintCount===1)hint=currentToken[0]+'___';
  else if(hintCount===2)hint=currentToken.slice(0,Math.ceil(currentToken.length/2))+'...';
  else{hint=currentToken;tokenStates[tokenIndex]='hint-shown';renderSlots();}
  strip.style.display='flex';
  strip.innerHTML=`<span class="hint-word">💡 提示：${hint}</span>`;
  if(hintCount>=3)hintCount=0;
}

function revealAll(){
  const reveal=document.getElementById('full-reveal');
  reveal.innerHTML=tokens.join(' ');
  reveal.style.display='block';
  document.getElementById('sentence-zh').textContent=currentSentenceZh;
}

function setMode(mode){
  practiceMode=mode;
  document.getElementById('mode-btn-word').classList.toggle('active',mode==='word');
  document.getElementById('mode-btn-full').classList.toggle('active',mode==='full');
  document.getElementById('hint-btn').style.display=mode==='word'?'':'none';
  document.getElementById('full-check-bar').style.display=mode==='full'?'block':'none';
  document.getElementById('sentence-label-text').textContent=mode==='word'?'逐词输入句子':'输入完整句子';
  // re-render slots for new mode (if already in practice)
  if(tokens.length>0){
    tokenStates=tokens.map(()=>'pending');
    tokenTyped=tokens.map(()=>'');
    tokenIndex=0;hintCount=0;
    document.getElementById('feedback-row').style.display='none';
    document.getElementById('btn-row').style.display='none';
    document.getElementById('full-reveal').style.display='none';
    document.getElementById('hint-strip').style.display='none';
    document.getElementById('sentence-zh').textContent='';
    renderSlots();updateWordCounter();
  }
}

function handleFullKey(e){} // no longer needed
function playTypingIfNeeded(){playTyping();}
function handleKey(e){if(e.key==='Enter'){e.preventDefault();submitWord();}}
function handleInput(){
  const inp=document.getElementById('word-input');
  if(inp&&inp.value.length>0)playTyping();
  if(inp&&inp.value.endsWith(' ')){inp.value=inp.value.trimEnd();submitWord();}
}

function submitFullSentence(){
  // collect all slot values and check
  const inputs=document.querySelectorAll('#slots-row .slot-input');
  tokenStates=tokens.map((t,i)=>{
    const uw=(inputs[i]?inputs[i].value.trim():tokenTyped[i])||'';
    tokenTyped[i]=uw;
    return normalizeWord(uw)===normalizeWord(t)?'correct':'wrong';
  });
  tokenIndex=tokens.length;
  renderSlots();updateWordCounter();
  finishSentence();
}

function retryCurrent(){
  setupTyping(currentSentence,currentSentenceZh,currentWord.w);
}

function nextWord(){practiceIndex++;updateProgress();loadPracticeWord();}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();}

// ── 快捷键（Shift+数字/空格，输入框有焦点时也能用）──
document.addEventListener('keydown',function(e){
  const practiceVisible=document.getElementById('tab-practice').classList.contains('active');
  if(!practiceVisible||!e.shiftKey)return;
  if(e.code==='Digit1'){e.preventDefault();speakCurrent();showShortcutFlash('1');}
  else if(e.code==='Digit2'){e.preventDefault();applySpeed(0.8);showShortcutFlash('2');}
  else if(e.code==='Digit3'){e.preventDefault();applySpeed(1.0);showShortcutFlash('3');}
  else if(e.code==='Digit4'){e.preventDefault();applySpeed(1.2);showShortcutFlash('4');}
  else if(e.code==='Digit5'){e.preventDefault();toggleHint();showShortcutFlash('5');}
  else if(e.code==='Digit6'){e.preventDefault();revealAll();showShortcutFlash('6');}
  else if(e.code==='Space'){
    e.preventDefault();
    // 只在句子完成后有效
    const btnRow=document.getElementById('btn-row');
    if(btnRow.style.display!=='none'){nextWord();showShortcutFlash('space');}
  }
});

function applySpeed(speed){
  const idMap={0.8:'spd-slow',1.0:'spd-normal',1.2:'spd-fast'};
  setSpeed(speed,null,idMap[speed]);
}

// 快捷键按下时的视觉闪烁反馈
function showShortcutFlash(key){
  // 找到对应按钮闪一下
  const map={'1':'speak-btn','2':null,'3':null,'4':null,'5':'hint-btn','6':null};
  const btnId=map[key];
  if(btnId){
    const btn=document.getElementById(btnId);
    if(btn){btn.style.transform='scale(0.9)';setTimeout(()=>btn.style.transform='',150);}
  }
  // 显示一个浮动提示
  let toast=document.getElementById('shortcut-toast');
  if(!toast){
    toast=document.createElement('div');
    toast.id='shortcut-toast';
    toast.style.cssText='position:fixed;bottom:32px;right:32px;background:var(--card);border:1px solid var(--border);color:var(--accent);font-family:"DM Mono",monospace;font-size:13px;padding:8px 16px;border-radius:8px;z-index:500;opacity:0;transition:opacity .15s;pointer-events:none;';
    document.body.appendChild(toast);
  }
  const labels={'1':'🔊 朗读  [⇧1]','2':'🐢 慢速  [⇧2]','3':'▶ 正常  [⇧3]','4':'🐇 快速  [⇧4]','5':'💡 提示  [⇧5]','6':'👁 答案  [⇧6]','space':'⇧空格  下一个 →'};
  toast.textContent=`[${key}] ${labels[key]}`;
  toast.style.opacity='1';
  clearTimeout(toast._timer);
  toast._timer=setTimeout(()=>toast.style.opacity='0',900);
}
</script>
